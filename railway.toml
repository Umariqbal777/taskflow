# ─────────────────────────────────────────────────────────────
#  TaskFlow — Railway configuration
#  Docs: https://docs.railway.app/reference/config-as-code
# ─────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node -e "
const{Pool}=require('pg');
const p=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
p.query('CREATE TABLE IF NOT EXISTS users(id SERIAL PRIMARY KEY,name VARCHAR(100) NOT NULL,email VARCHAR(255) UNIQUE NOT NULL,password VARCHAR(255) NOT NULL,role VARCHAR(20) NOT NULL DEFAULT \'member\',avatar VARCHAR(10),color VARCHAR(20) DEFAULT \'#7c6af5\',created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());CREATE TABLE IF NOT EXISTS projects(id SERIAL PRIMARY KEY,name VARCHAR(200) NOT NULL,description TEXT,status VARCHAR(20) DEFAULT \'active\',due_date DATE,created_by INTEGER,created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());CREATE TABLE IF NOT EXISTS tasks(id SERIAL PRIMARY KEY,title VARCHAR(300) NOT NULL,description TEXT,project_id INTEGER,assignee_id INTEGER,created_by INTEGER,priority VARCHAR(10) DEFAULT \'medium\',status VARCHAR(20) DEFAULT \'todo\',due_date DATE,created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());CREATE TABLE IF NOT EXISTS activity_log(id SERIAL PRIMARY KEY,user_id INTEGER,message TEXT NOT NULL,entity_type VARCHAR(50),entity_id INTEGER,created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());').then(()=>{console.log('Tables OK');p.end();require('./src/index.js')}).catch(e=>{console.error(e.message);process.exit(1)})
""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "taskflow"
